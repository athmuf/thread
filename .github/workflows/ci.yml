name: Continuous Integration

on:
  pull_request:
    branches:
      - master

jobs:
  automation-test-job:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: https://forum-api.dicoding.dev/v1

    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'   # ✅ pin a specific version

      - name: npm install and test
        run: |
          npm install
          npm run ci:test